name: Certificación 1 - QA Engineering - Ejercicio A - Automatización E2E con Arquitectura Asíncrona
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  ejecutar-automatizacion-e2e:
    name: Ejecutar Automatización E2E con Playwright
    runs-on: ubuntu-latest
    steps:
    - name: 1. Clonar repositorio
      uses: actions/checkout@v4
    - name: 2. Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: 3. Levantar arquitectura asíncrona
      run: |
        docker compose up -d
          echo "Esperando que Kafka-Broker esté listo..."
          timeout 120 bash -c 'until docker compose exec -T kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1; do sleep 2; done'
    
    - name: 4. Instalar backend
      run: |
        cd backend
        npm ci

    - name: 5. Instalar frontend
      run: |
        cd frontend
        npm ci
    
    - name: 6. Instalar playwright 
      run: |
        cd qa-automation
        npm ci
    
    - name: 7. Lanzar Aplicación y Consumidor en Segundo Plano
      run: |
          cd backend
          npm run start-server > server.log 2>&1 &
          npm run start-worker > worker.log 2>&1 &
          echo "Esperando endpoint de salud del backend..."
          timeout 120 bash -c 'until curl -fsS http://localhost:3000/health >/dev/null; do sleep 2; done'
    
    - name: 8. Ejecutar frontend en segundo plano
      run: |
          cd frontend
          npm run dev

    - name: 9. Ejecutar pruebas Playwright
      run: |
          cd tests
          npm run test

